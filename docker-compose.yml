version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: capstone-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capstone}
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capstone}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: innovatex-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://capstone:capstone@postgres:5432/capstone}
      APP_LOGIN_EMAIL: ${APP_LOGIN_EMAIL:-dr.maya.kim@northstar-clinic.test}
      APP_LOGIN_PASSWORD: ${APP_LOGIN_PASSWORD:-NorthstarDemo!2026}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_TEXT_MODEL: ${GROQ_TEXT_MODEL:-llama-3.1-8b-instant}
    ports:
      - "8000:8000"
    volumes:
      # Let annotated images persist and be accessible
      - ./backend/static:/app/static
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: innovatex-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
